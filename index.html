<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ria's Cuts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading recommendations...</p>
</div>

<!-- Fullscreen Image Viewer -->
<div class="fullscreen-viewer" id="fullscreen-viewer">
  <img id="fullscreen-img" src="" alt="">
</div>

<!-- App -->
<div id="app">

  <!-- HOME VIEW -->
  <div class="view active" id="home-view">
    <div class="home-nav">
      <span class="nav-brand"><span class="nav-ria">RIA'S</span> <span class="nav-cuts">Cuts.</span></span>
      <span class="nav-counter" id="movie-counter"></span>
    </div>

    <div class="home-body">
      <!-- Poster in frosted glass frame -->
      <div class="glass-frame" id="tile-dock">
        <div class="tile-container" id="tile-container">
          <div class="tile-3d" id="tile-3d">
            <div class="tile-ambient-shadow" id="tile-shadow"></div>
            <div class="tile-front">
              <img id="tile-poster" src="" alt="">
            </div>
          </div>
        </div>
      </div>

      <!-- Movie info below card -->
      <div class="movie-info">
        <div class="info-title" id="tile-title"></div>
        <div class="info-row">
          <span class="info-year" id="tile-year"></span>
          <span class="info-genre" id="tile-category"></span>
          <span class="info-score" id="card-tmdb"></span>
        </div>
        <div class="info-streaming" id="streaming-strip"></div>
      </div>

      <!-- Action buttons -->
      <div class="home-actions">
        <button class="hact" id="act-skip" aria-label="Skip">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Skip</span>
        </button>
        <button class="hact primary" id="act-detail" aria-label="Details">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span>Details</span>
        </button>
        <button class="hact green" id="act-watched" aria-label="Watched">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Watched</span>
        </button>
        <button class="hact" id="act-surprise" aria-label="Surprise Me">
          <svg viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span>Shuffle</span>
        </button>
      </div>
    </div>

    <div class="chevron-btn" id="chevron-btn">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="detail-view"></div>

  <!-- CATEGORIES VIEW -->
  <div class="view" id="categories-view">
    <div class="categories-header">Categories</div>
    <div class="categories-grid" id="categories-grid"></div>
    <div class="chevron-btn flipped" id="cat-chevron-btn">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- CATEGORY STACK VIEW -->
  <div class="view" id="category-stack-view"></div>

  <!-- LIKED VIEW -->
  <div class="view" id="liked-view">
    <div class="collection-header">Liked</div>
    <div class="collection-empty" id="liked-empty">Movies you like will appear here.</div>
    <div class="collection-grid" id="liked-grid"></div>
  </div>

  <!-- SAVED VIEW -->
  <div class="view" id="saved-view">
    <div class="collection-header">Saved</div>
    <div class="collection-empty" id="saved-empty">Movies you save will appear here.</div>
    <div class="collection-grid" id="saved-grid"></div>
  </div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-item active" id="tab-home" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-item" id="tab-liked" data-tab="liked">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Liked</span>
    </button>
    <button class="tab-item" id="tab-saved" data-tab="saved">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Saved</span>
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</div>

<!-- Scripts: data first, then components, then app -->
<script src="data.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
</body>
</html>
