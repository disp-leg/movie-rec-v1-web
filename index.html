<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ria's Cuts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading recommendations...</p>
</div>

<!-- Fullscreen Image Viewer -->
<div class="fullscreen-viewer" id="fullscreen-viewer">
  <img id="fullscreen-img" src="" alt="">
</div>

<!-- App -->
<div id="app">

  <!-- HOME VIEW -->
  <div class="view active" id="home-view">
    <div class="bg-photo"></div>
    <div class="showcase-header">
      <div class="sh-brand">RIA'S</div>
      <div class="sh-sub">Cuts.</div>
    </div>

    <div class="showcase-feed" id="showcase-feed"></div>

    <button class="surprise-fab" id="surprise-fab" aria-label="Surprise Me">
      <svg viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    </button>

    <div class="chevron-btn" id="chevron-btn">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="detail-view"></div>

  <!-- CATEGORIES VIEW -->
  <div class="view" id="categories-view">
    <div class="categories-header">Categories</div>
    <div class="categories-grid" id="categories-grid"></div>
    <div class="chevron-btn flipped" id="cat-chevron-btn">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- CATEGORY STACK VIEW -->
  <div class="view" id="category-stack-view"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</div>

<!-- Scripts: data first, then components, then app -->
<script src="data.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
</body>
</html>
